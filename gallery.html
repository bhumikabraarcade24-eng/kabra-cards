<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Collection - Kabra Cards</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    :root { --bg-pastel-beige: #F9F6F0; }
    .wedding-texture-bg {
      background-color: var(--bg-pastel-beige);
      background-image: radial-gradient(#e5e1da 1.5px, transparent 1.5px);
      background-size: 24px 24px;
    }
  </style>
</head>
<body class="wedding-texture-bg min-h-screen text-stone-800 p-4 md:p-8">

  <div class="max-w-7xl mx-auto">
    
    <div class="flex justify-between items-center mb-6">
      <a href="index.html" class="text-stone-600 hover:text-stone-900 text-xs font-semibold uppercase tracking-wider flex items-center gap-1 transition">
        ← Exit Gallery
      </a>
      <span class="text-[11px] font-mono font-bold bg-emerald-50 text-emerald-700 px-3 py-1 rounded-full border border-emerald-100">
        🔒 SECURE CUSTOMER SESSION
      </span>
    </div>

    <header class="text-center my-10 space-y-2">
      <h1 class="text-4xl font-serif text-stone-800 tracking-wide">The Premium Collection</h1>
      <p class="text-xs text-stone-400 tracking-widest uppercase font-mono">Exclusive Guest Access Granted</p>
      <div class="w-12 h-0.5 bg-amber-300 mx-auto pt-0.5"></div>
    </header>

    <section class="mb-10 space-y-4 bg-white p-6 rounded-2xl border border-stone-200 shadow-sm">
      <div class="flex flex-wrap gap-2 items-center">
        <span class="text-xs font-bold text-stone-400 uppercase tracking-wider mr-2">Category:</span>
        <button onclick="filterCategory('all')" class="cat-btn px-4 py-1.5 rounded-full text-xs font-medium bg-stone-800 text-white transition cursor-pointer">All Designs</button>
        <button onclick="filterCategory('hindu')" class="cat-btn px-4 py-1.5 rounded-full text-xs font-medium bg-stone-100 text-stone-600 hover:bg-stone-200 transition cursor-pointer">Hindu Cards</button>
        <button onclick="filterCategory('muslim')" class="cat-btn px-4 py-1.5 rounded-full text-xs font-medium bg-stone-100 text-stone-600 hover:bg-stone-200 transition cursor-pointer">Muslim Cards</button>
        <button onclick="filterCategory('envelope')" class="cat-btn px-4 py-1.5 rounded-full text-xs font-medium bg-stone-100 text-stone-600 hover:bg-stone-200 transition cursor-pointer">Envelopes</button>
        <button onclick="filterCategory('box')" class="cat-btn px-4 py-1.5 rounded-full text-xs font-medium bg-stone-100 text-stone-600 hover:bg-stone-200 transition cursor-pointer">Box Designs</button>
        <button onclick="filterCategory('birthday')" class="cat-btn px-4 py-1.5 rounded-full text-xs font-medium bg-stone-100 text-stone-600 hover:bg-stone-200 transition cursor-pointer">Birthday Invitations</button>
      </div>

      <div class="flex flex-wrap gap-2 items-center pt-2 border-t border-stone-100">
        <span class="text-xs font-bold text-stone-400 uppercase tracking-wider mr-9">Tag:</span>
        <button onclick="filterTag('all')" class="tag-btn px-3 py-1 rounded-md text-xs font-medium bg-amber-100 text-amber-800 transition cursor-pointer">All Templates</button>
        <button onclick="filterTag('new')" class="tag-btn px-3 py-1 rounded-md text-xs font-medium bg-stone-50 text-stone-600 hover:bg-stone-100 transition cursor-pointer">⭐ New</button>
        <button onclick="filterTag('latest')" class="tag-btn px-3 py-1 rounded-md text-xs font-medium bg-stone-50 text-stone-600 hover:bg-stone-100 transition cursor-pointer">⚡ Latest</button>
        <button onclick="filterTag('trending')" class="tag-btn px-3 py-1 rounded-md text-xs font-medium bg-stone-50 text-stone-600 hover:bg-stone-100 transition cursor-pointer">🔥 Trending</button>
        <button onclick="filterTag('customizable')" class="tag-btn px-3 py-1 rounded-md text-xs font-medium bg-stone-50 text-stone-600 hover:bg-stone-100 transition cursor-pointer">✨ Customizable</button>
      </div>
    </section>

    <main id="galleryGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8 mb-16">
    </main>
  </div>

  <div id="zoomModal" onclick="closeZoomModal()" class="fixed inset-0 bg-stone-950/90 backdrop-blur-md z-50 flex items-center justify-center p-4 opacity-0 pointer-events-none transition-opacity duration-300">
    <button onclick="closeZoomModal()" class="absolute top-6 right-6 text-white bg-white/10 hover:bg-white/20 w-10 h-10 rounded-full flex items-center justify-center text-xl font-light transition cursor-pointer">&times;</button>
    
    <div class="relative max-w-4xl w-full flex flex-col justify-center items-center" onclick="event.stopPropagation()">
      <button id="modalPrevBtn" onclick="changeModalImage(-1)" class="absolute left-2 md:-left-16 bg-white/10 hover:bg-white/25 border border-white/20 text-white w-12 h-12 rounded-full flex items-center justify-center font-bold text-xl transition shadow cursor-pointer z-10">‹</button>
      
      <img id="modalTargetImg" class="max-w-full max-h-[80vh] rounded-xl shadow-2xl object-contain transform scale-95 transition-all duration-300 bg-stone-900" src="" alt="High resolution view">
      
      <button id="modalNextBtn" onclick="changeModalImage(1)" class="absolute right-2 md:-right-16 bg-white/10 hover:bg-white/25 border border-white/20 text-white w-12 h-12 rounded-full flex items-center justify-center font-bold text-xl transition shadow cursor-pointer z-10">›</button>
      
      <div id="modalCountBadge" class="mt-4 bg-stone-800 text-stone-300 font-mono text-[11px] px-3 py-1 rounded-full border border-stone-700">1 / 1</div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAy-4z99Ia3-og9p4IlH3fUi06zoMUft-4",
      authDomain: "kabra-cards.firebaseapp.com",
      projectId: "kabra-cards",
      storageBucket: "kabra-cards.firebasestorage.app",
      messagingSenderId: "285718844469",
      appId: "1:285718844469:web:72725ee725ec2f54f68d7c"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let allCardsData = [];
    let selectedCategory = 'all';
    let selectedTag = 'all';

    let currentModalImages = [];
    let currentModalIndex = 0;

    db.collection("portfolio").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
      allCardsData = [];
      snapshot.forEach(doc => {
        allCardsData.push({ id: doc.id, ...doc.data() });
      });
      renderCards();
    });

    function renderCards() {
      const grid = document.getElementById('galleryGrid');
      grid.innerHTML = "";

      const filtered = allCardsData.filter(card => {
        const matchesCat = (selectedCategory === 'all' || card.category === selectedCategory);
        const matchesTag = (selectedTag === 'all' || card.tag === selectedTag);
        return matchesCat && matchesTag;
      });

      if(filtered.length === 0) {
        grid.innerHTML = `<div class="col-span-full p-12 text-center text-stone-400">No premium designs fit the selected sorting configuration.</div>`;
        return;
      }

      filtered.forEach(card => {
        const allImagesArray = card.imageUrls && card.imageUrls.length > 0 ? card.imageUrls : [card.imageUrl || ''];
        const displayThumb = allImagesArray[0];
        const escapedImagesStr = encodeURIComponent(JSON.stringify(allImagesArray));

        const element = document.createElement('div');
        element.className = "bg-white rounded-2xl overflow-hidden shadow-sm border border-stone-200/60 flex flex-col group hover:shadow-md transition duration-300";
        element.innerHTML = `
          <div onclick="openZoomModal('${escapedImagesStr}')" class="aspect-[4/5] bg-stone-100 overflow-hidden relative cursor-zoom-in border-b border-stone-100">
            <img class="w-full h-full object-cover group-hover:scale-105 transition duration-500" src="${displayThumb}" alt="${card.title}">
            <span class="absolute top-3 left-3 bg-stone-900/80 backdrop-blur-sm text-white px-2.5 py-0.5 rounded-md font-mono text-[10px] font-bold tracking-wider uppercase">${card.tag}</span>
            
            ${allImagesArray.length > 1 ? `
              <span class="absolute bottom-3 right-3 bg-amber-500 text-stone-950 px-2.5 py-0.5 rounded-md font-mono text-[10px] font-bold shadow-md tracking-wide">
                📄 ${allImagesArray.length} Photos
              </span>
            ` : ''}
          </div>
          <div class="p-5 flex-grow flex flex-col justify-between">
            <div>
              <h3 class="font-serif text-lg text-stone-900">${card.title}</h3>
              <p class="text-xs text-amber-700 font-medium capitalize mt-0.5">${card.category} Collection</p>
              <p class="text-xs text-stone-500 mt-2 leading-relaxed">${card.description || 'Premium design sample from Kabra Collection.'}</p>
            </div>
            <a href="https://wa.me/9423977200?text=Hi, I am interested in the design: ${encodeURIComponent(card.title)}" target="_blank" class="w-full mt-5 block text-center bg-stone-800 hover:bg-amber-700 text-white text-xs font-semibold uppercase tracking-wider py-2.5 rounded-xl transition shadow-sm">
              Inquire via WhatsApp
            </a>
          </div>
        `;
        grid.appendChild(element);
      });
    }

    function filterCategory(cat) {
      selectedCategory = cat;
      document.querySelectorAll('.cat-btn').forEach(btn => {
        btn.classList.remove('bg-stone-800', 'text-white');
        btn.classList.add('bg-stone-100', 'text-stone-600');
      });
      event.target.classList.replace('bg-stone-100', 'bg-stone-800');
      event.target.classList.replace('text-stone-600', 'text-white');
      renderCards();
    }

    function filterTag(tag) {
      selectedTag = tag;
      document.querySelectorAll('.tag-btn').forEach(btn => {
        btn.classList.remove('bg-amber-100', 'text-amber-800');
        btn.classList.add('bg-stone-50', 'text-stone-600');
      });
      event.target.classList.replace('bg-stone-50', 'bg-amber-100');
      event.target.classList.replace('text-stone-600', 'text-amber-800');
      renderCards();
    }

    function openZoomModal(escapedImages) {
      try {
        currentModalImages = JSON.parse(decodeURIComponent(escapedImages));
        currentModalIndex = 0;
        if (!currentModalImages || currentModalImages.length === 0) return;

        const modal = document.getElementById('zoomModal');
        modal.classList.remove('opacity-0', 'pointer-events-none');
        
        renderModalImage();
      } catch(e) {
        console.error("Error configuration parsing:", e);
      }
    }

    function renderModalImage() {
      const img = document.getElementById('modalTargetImg');
      const countBadge = document.getElementById('modalCountBadge');
      const prevBtn = document.getElementById('modalPrevBtn');
      const nextBtn = document.getElementById('modalNextBtn');

      img.classList.add('scale-95');
      img.src = currentModalImages[currentModalIndex];
      
      countBadge.textContent = `${currentModalIndex + 1} / ${currentModalImages.length}`;

      if (currentModalImages.length <= 1) {
        prevBtn.classList.add('hidden');
        nextBtn.classList.add('hidden');
      } else {
        prevBtn.classList.remove('hidden');
        nextBtn.classList.remove('hidden');
      }

      setTimeout(() => img.classList.remove('scale-95'), 50);
    }

    function changeModalImage(direction) {
      currentModalIndex += direction;
      if (currentModalIndex >= currentModalImages.length) currentModalIndex = 0;
      if (currentModalIndex < 0) currentModalIndex = currentModalImages.length - 1;
      renderModalImage();
    }

    function closeZoomModal() {
      const modal = document.getElementById('zoomModal');
      const img = document.getElementById('modalTargetImg');
      img.classList.add('scale-95');
      modal.classList.add('opacity-0', 'pointer-events-none');
    }

    document.addEventListener('keydown', (e) => {
      const modal = document.getElementById('zoomModal');
      if (modal && !modal.classList.contains('pointer-events-none')) {
        if (e.key === 'ArrowRight') changeModalImage(1);
        if (e.key === 'ArrowLeft') changeModalImage(-1);
        if (e.key === 'Escape') closeZoomModal();
      }
    });
  </script>
</body>
</html>
